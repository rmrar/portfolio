* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0c10;
    font-family: 'Inter', sans-serif;
    color: #eef2ff;
    line-height: 1.5;
    scroll-behavior: smooth;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(230, 180, 34, 0.12) 0%, rgba(10, 12, 16, 0.95) 70%),
                radial-gradient(circle at 80% 70%, rgba(245, 176, 66, 0.08) 0%, transparent 60%);
    z-index: -2;
    pointer-events: none;
}

#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
    position: relative;
    z-index: 1;
}

.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 3rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    position: sticky;
    top: 0;
    background: rgba(10, 12, 16, 0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
}

.logo {
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f5b042, #e6b422, #f5d742);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: softPulse 3s ease-in-out infinite;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo i {
    color: #e6b422;
}

.header-links a {
    color: #b9c7d9;
    margin-left: 1.8rem;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
}

.header-links a:hover {
    color: #e6b422;
}

/* ===== HERO ===== */

.hero {
    position: relative;
    border-radius: 2rem;
    overflow: hidden;
    margin-bottom: 3rem;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
}

.hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
    background: linear-gradient(135deg, rgba(18, 22, 28, 0.85) 0%, rgba(18, 22, 28, 0.65) 100%);
    backdrop-filter: blur(3px);
    border: 1px solid rgba(230, 180, 34, 0.15);
    border-radius: 2rem;
    opacity: 0;
    transform: translateY(16px);
    animation: heroin .7s cubic-bezier(.22,1,.36,1) .1s forwards;
}

@keyframes heroin {
    to { opacity: 1; transform: translateY(0); }
}

.hero-left {
    flex: 1;
    min-width: 280px;
}

.hero-right {
    flex-shrink: 0;
}

    position: relative;
    display: inline-block;
