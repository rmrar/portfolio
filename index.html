<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="description" content="rm.rar - Personal portfolio">
<meta name="author" content="rm.rar">
<title>rm.rar - Portfolio</title>
<link rel="icon" type="image/png" href="avatar.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #060a12;
    font-family: 'Inter', sans-serif;
    color: #dce6f5;
    line-height: 1.5;
    scroll-behavior: smooth;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(100, 180, 255, 0.06) 0%, rgba(6, 10, 18, 0.95) 70%),
                radial-gradient(circle at 80% 70%, rgba(180, 220, 255, 0.04) 0%, transparent 60%);
    z-index: -2;
    pointer-events: none;
}

#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
    position: relative;
    z-index: 1;
}

/* ===== BANNER ===== */
.banner-wrapper {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 1.5rem;
    position: relative;
    z-index: 1;
}

.banner {
    width: 100%;
    height: 220px;
    border-radius: 1.5rem;
    object-fit: cover;
    border: 1px solid rgba(150, 200, 255, 0.12);
    box-shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.5);
    display: block;
    margin-bottom: 1.5rem;
}

.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(150, 200, 255, 0.08);
    position: sticky;
    top: 0;
    background: rgba(6, 10, 18, 0.85);
    backdrop-filter: blur(10px);
    z-index: 10;
}

.logo {
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #b8d8ff, #7ab8ff, #b0d4ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: softPulse 3s ease-in-out infinite;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo i {
    color: #7ab8ff;
}

.header-links a {
    color: #a0bcd9;
    margin-left: 1.8rem;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
    font-size: 0.9rem;
}

.header-links a:hover {
    color: #7ab8ff;
}

/* ===== HERO ===== */

.hero {
    position: relative;
    border-radius: 2rem;
    overflow: hidden;
    margin-bottom: 3rem;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
}

.hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    padding: 2.2rem;
    background: linear-gradient(145deg, rgba(12, 20, 32, 0.85) 0%, rgba(8, 14, 24, 0.6) 100%);
    backdrop-filter: blur(3px);
    border: 1px solid rgba(150, 200, 255, 0.1);
    border-radius: 2rem;
    opacity: 0;
    transform: translateY(16px);
    animation: heroin .7s cubic-bezier(.22,1,.36,1) .1s forwards;
}

@keyframes heroin {
    to { opacity: 1; transform: translateY(0); }
}

.hero-left {
    flex: 1;
    min-width: 280px;
}

.hero-right {
    flex-shrink: 0;
}

.avatar-wrapper {
    position: relative;
    display: inline-block;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #7ab8ff;
    box-shadow: 0 10px 30px -5px rgba(122, 184, 255, 0.15);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.avatar:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 35px -5px rgba(122, 184, 255, 0.3);
}

.discord-badge {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 3px solid #0e1622;
    background-color: #747f8d;
    transition: all 0.2s;
    cursor: pointer;
}

.discord-badge.online { background-color: #23a55a; }
.discord-badge.idle { background-color: #f0b232; }
.discord-badge.dnd { background-color: #f23f43; }
.discord-badge.offline { background-color: #80848e; }

.info h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #d0e5ff, #7ab8ff, #a8d0ff);
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0.25rem;
    animation: shimmer 4s ease-in-out infinite;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

@keyframes softPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
}

.bio {
    font-size: 0.95rem;
    color: #b0cce6;
    max-width: 550px;
    margin: 12px 0 18px 0;
}

.bio strong {
    background: linear-gradient(135deg, #7ab8ff, #a8d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
}

.links-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
}

.btn-icon {
    background: #0e1622;
    padding: 7px 16px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    color: #d0e2f5;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    border: 1px solid #1a2a3a;
}

.btn-icon:hover {
    background: #14202e;
    border-color: #7ab8ff;
    color: #c0dcff;
    transform: translateY(-2px);
}

/* ===== SECTIONS ===== */

.section-title {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 2rem 0 1.2rem 0;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 4px solid #7ab8ff;
    padding-left: 18px;
    background: linear-gradient(135deg, #dce6f5, #7ab8ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.projects-grid,
.edits-grid,
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.4rem;
    margin-bottom: 2rem;
}

.card {
    background: linear-gradient(145deg, #0e1622, #0a101a);
    border-radius: 1.4rem;
    padding: 1.3rem 1.5rem;
    border: 1px solid #1a2a3a;
    transition: all 0.25s;
}

.card:hover {
    border-color: #7ab8ff;
    transform: translateY(-4px);
    background: linear-gradient(145deg, #111c2a, #0e1622);
}

.card h3 {
    font-size: 1.15rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #dce6f5;
}

.card p {
    font-size: 0.85rem;
    color: #90acc9;
    margin-bottom: 0.5rem;
}

.stat-number {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #7ab8ff, #a8d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 8px 0;
}

.card-link {
    color: #7ab8ff;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.8rem;
    transition: color 0.2s;
}

.card-link:hover {
    color: #a8d0ff;
}

.inline-badge {
    background: #7ab8ff20;
    border-radius: 30px;
    padding: 2px 8px;
    font-size: 0.7rem;
    color: #7ab8ff;
}

.speed-card {
    background: linear-gradient(145deg, #0c141e, #0a101a);
    border-radius: 1.5rem;
    padding: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #1a2a3a;
    margin: 1rem 0;
}

.speedtest-img {
    max-width: 240px;
    border-radius: 12px;
    border: 1px solid #1a2a3a;
    transition: 0.2s;
}

.speedtest-img:hover {
    border-color: #7ab8ff;
    transform: scale(1.02);
}

/* ===== FOOTER ===== */

.footer {
    margin-top: 4rem;
    padding: 3rem 2rem 1.5rem;
    background: rgba(6, 10, 18, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 2rem 2rem 1.5rem 1.5rem;
    border-top: 1px solid rgba(150, 200, 255, 0.1);
}

.footer-content {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 2rem;
    margin-bottom: 2rem;
}

.footer-brand .logo {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #7ab8ff, #b0d4
