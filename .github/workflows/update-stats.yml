name: Update stats

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape TikTok stats
        run: |
          python3 - << 'PYEOF'
          import re, json, urllib.request, time

          url = "https://www.tiktok.com/@rm.rar"
          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          })
          try:
              html = urllib.request.urlopen(req, timeout=20).read().decode("utf-8", "ignore")
              m = re.search(r'"stats":\{"followerCount":(\d+),"followingCount":(\d+),"heart":(\d+),"heartCount":(\d+),"videoCount":(\d+)', html)
              if m:
                  data = {
                      "followers": int(m.group(1)),
                      "following": int(m.group(2)),
                      "likes": int(m.group(3)),
                      "videos": int(m.group(5)),
                      "updatedAt": int(time.time() * 1000),
                  }
              else:
                  raise ValueError("stats block not found in page")
          except Exception as e:
              print("Scrape failed:", e)
              # keep old stats.json untouched if scrape fails
              raise SystemExit(0)

          with open("stats.json", "w") as f:
              json.dump(data, f)
          print(data)
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "stats-bot"
          git config user.email "actions@github.com"
          git add stats.json
          git diff --cached --quiet || git commit -m "auto: update tiktok stats"
          git push
